name: Release Regression

on:
  pull_request:
    types: [opened, reopened, synchronize, labeled]
  workflow_dispatch:
    inputs:
      ghidra_path:
        description: "Path to the Ghidra install on the self-hosted runner"
        required: true
        default: "F:\\ghidra_12.1.2_PUBLIC"
      test_tier:
        description: "Deploy regression tier to run"
        required: true
        type: choice
        default: "release"
        options:
          - release
          - selected-contract
          - benchmark-read
          - benchmark-write
          - multi-program
          - negative-contract
          - endpoint-catalog
  workflow_call:
    inputs:
      ghidra_path:
        description: "Path to the Ghidra install on the self-hosted runner"
        required: true
        type: string
      test_tier:
        description: "Deploy regression tier to run"
        required: false
        type: string
        default: "release"

# OSSF Scorecard Token-Permissions: default to read-only. The
# regression runner reads the checked-out tree and uploads test
# artifacts (via actions/upload-artifact, which does NOT need
# repo-write — it uses its own scoped token).
permissions:
  contents: read

jobs:
  live-ghidra-regression:
    name: Live Ghidra Release Regression
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'live-ghidra-regression')
    runs-on: [self-hosted, Windows]
    timeout-minutes: 30
    env:
      GHIDRA_REGRESSION_PATH: ${{ inputs.ghidra_path || vars.GHIDRA_PATH || 'F:\ghidra_12.1.2_PUBLIC' }}
      GHIDRA_REGRESSION_TIER: ${{ inputs.test_tier || 'release' }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up JDK 21
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287  # v5.3.0
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6.8.0
        with:
          enable-cache: true

      - name: Set up Python and dependencies
        shell: powershell
        run: |
          uv python install 3.13
          uv sync --python 3.13 --group test --group fun-doc

      - name: Build Benchmark.dll
        shell: powershell
        run: uv run python fun-doc\benchmark\build.py

      - name: Install Ghidra jars
        shell: powershell
        run: uv run python -m tools.setup install-ghidra-deps --ghidra-path "$env:GHIDRA_REGRESSION_PATH"

      - name: Build extension
        shell: powershell
        run: uv run python -m tools.setup build

      - name: Deploy and run release regression
        shell: powershell
        run: uv run python -m tools.setup deploy --ghidra-path "$env:GHIDRA_REGRESSION_PATH" --test "$env:GHIDRA_REGRESSION_TIER"

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: release-regression-artifacts
          path: |
            tests/junit.xml
            target/*.zip
            deploy-debug.log
          if-no-files-found: ignore
